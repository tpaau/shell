name: Checks

on:
  push:
  pull_request:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Update
      run: sudo apt-get update
    - name: Install dependencies
      run: sudo apt install qt6-base-dev
    - name: Check format
      run: ./scripts/fmt.sh --check
    - name: Checks
      run: ./scripts/checks/check-lock.sh
