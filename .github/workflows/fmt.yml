name: Checks

on:
  push:
  pull_request:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Update
      run: sudo apt-get update
    - name: Search for the package
      run: apt search qt6 qml
    - name: Install dependencies
      run: sudo apt install -y qt6-base-dev-tools
    - name: Check format
      run: ./scripts/fmt.sh --check
    - name: Check lock security
      run: ./scripts/checks/check-lock.sh
